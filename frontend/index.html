<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowMind</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main class="app-shell">
        <section class="chat-panel" aria-label="KnowMind 聊天窗口">
            <header class="chat-header">
                <div>
                    <p class="eyebrow">KnowMind</p>
                    <h1>知识库问答助手</h1>
                </div>
                <span class="status-pill">本地演示</span>
            </header>

            <section id="messageList" class="message-list" aria-live="polite">
                <article class="message message-ai">
                    <div class="avatar">K</div>
                    <div class="bubble">
                        你好，我是 KnowMind。当前是 Day 03 的前端本地聊天闭环。
                    </div>
                </article>
            </section>

            <form id="chatForm" class="chat-form">
                <label class="visually-hidden" for="messageInput">输入消息</label>
                <textarea id="messageInput" rows="1" placeholder="输入一条消息" autocomplete="off"></textarea>
                <button id="sendButton" type="submit">发送</button>
            </form>
        </section>
    </main>
    <script src="/script.js"></script>
</body>
</html>
